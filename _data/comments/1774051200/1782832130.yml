msg: "سلا. خواستم ازتون تشکر کنم. هر ساله از تقویم شما برای گوگل استفاده میکنم. اگر تقویم سال بعد رو هم بتونید زودتر درست کنید خیلی بهتره . بعضی کارها و برنامه ریزی ها حداقل به یک سال بعد مرتبط هستند. راهتون روشن و مستدام . باتشکر <hr>پاسخ: سلام. من معمولاً یک تا چند ماه زودتر از شروع هر سال، تقویم را در گروهی که ابتدای نوشته معرفی کرده‌ام، قرار می‌دهم."
